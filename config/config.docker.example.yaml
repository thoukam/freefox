# Configuration FreeFox pour Docker.
# Les chemins ci-dessous sont les chemins vus depuis le container.

robot_id: robot-01

watch:
  directory: /bags
  stable_seconds: 5.0
  extensions:
    - .mcap
    - .db3
  ignore_patterns:
    - "*.active"
    - "*.tmp"
    - metadata.yaml

upload:
  workers: 1
  chunk_size: 8388608
  max_retries: 10
  retry_backoff_base: 2.0
  retry_backoff_max: 300.0
  quota_retry_delay: 60.0
  transient_retry_delay: 60.0
  retry_failed_on_start: true
  verify_blake3: true
  deduplicate_by_hash: true
  delete_after_upload: false

storage:
  backend: gdrive

drive:
  # Fichier OAuth2 ou compte de service monte dans /etc/freefox/secrets.
  credentials_file: /etc/freefox/secrets/freefox-oauth-client.json

  # ID du dossier Google Drive cible.
  target_folder_id: "ID_DU_DOSSIER_GOOGLE_DRIVE"

  # Chemin Drive final: <robot_id>/<YYYY-MM-DD>/<filename>
  use_date_subfolder: true

rsync:
  # Exemples:
  # destination: /backup/freefox
  # destination: user@serveur:/data/freefox
  destination: /backup/freefox
  ssh_command: ssh
  options:
    - --archive
    - --partial
    - --inplace
    - --mkpath
    - --info=progress2
  use_date_subfolder: true

# Base SQLite persistante montee depuis l'hote.
queue_db: /var/lib/freefox/queue.db

log_level: INFO
