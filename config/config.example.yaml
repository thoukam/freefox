# Configuration FreeFox
# Copier ce fichier vers /etc/freefox/config.yaml puis l'adapter.

# Identifiant unique du robot.
# Peut etre surcharge avec la variable d'environnement FREEFOX_ROBOT_ID.
# Si vide, FreeFox utilise le hostname de la machine.
robot_id: robot-01

watch:
  # Dossier ou ros2 bag record ecrit ses fichiers.
  # La surveillance est recursive: les sous-dossiers sont inclus.
  directory: /home/ros/bags

  # Nombre de secondes sans changement de taille avant de considerer
  # un fichier comme termine.
  # A regler >= a l'intervalle de split si vous utilisez --max-bag-duration.
  stable_seconds: 5.0

  # Extensions de fichiers a collecter.
  extensions:
    - .mcap
    - .db3

  # Motifs glob a ignorer: enregistrements actifs, fichiers temporaires, etc.
  ignore_patterns:
    - "*.active"
    - "*.tmp"
    - metadata.yaml   # Metadonnees ROS 2 du bag

upload:
  # Nombre de threads d'upload en parallele.
  workers: 2

  # Taille des chunks pour les uploads resumables, en octets.
  # Minimum Google Drive: 256 KiB.
  # 8 MiB est un bon defaut pour la plupart des connexions.
  chunk_size: 8388608  # 8 MiB

  # Politique de retry avec backoff exponentiel:
  # delai = min(base^retries, max)
  max_retries: 10
  retry_backoff_base: 2.0    # seconds
  retry_backoff_max: 300.0   # 5 min
  quota_retry_delay: 60.0    # retry quota toutes les 60s

  # Passer a true pour supprimer le bag local apres upload confirme.
  delete_after_upload: false

drive:
  # Chemin vers credentials.json, OAuth2 ou compte de service.
  # Peut etre surcharge avec FREEFOX_CREDENTIALS.
  credentials_file: /etc/freefox/credentials.json

  # ID du dossier Google Drive cible.
  # Il est visible dans l'URL d'un dossier:
  # drive.google.com/drive/folders/<ID>
  # Laisser vide pour envoyer a la racine de My Drive.
  target_folder_id: "ID_DU_DOSSIER_GOOGLE_DRIVE"

  # Organise les fichiers sous <robot_id>/<YYYY-MM-DD>/<filename>
  # dans le dossier cible.
  use_date_subfolder: true

# Base SQLite de la file d'upload persistante.
queue_db: /var/lib/freefox/queue.db

# Niveau de logs: DEBUG | INFO | WARNING | ERROR
log_level: INFO
